<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="200" viewBox="0 0 1000 200" preserveAspectRatio="none">
  <style>
    .point {
      fill: rgba(0, 120, 212, 0.3);
      animation: drift 10s infinite alternate linear;
    }
    .point:nth-child(2n) {
      fill: rgba(142, 117, 178, 0.3);
      animation-duration: 15s;
    }
    .point:nth-child(3n) {
      fill: rgba(109, 179, 63, 0.3);
      animation-duration: 20s;
    }
    
    @keyframes drift {
      from { transform: translate(0, 0); }
      to { transform: translate(20px, 20px); }
    }

    /* Efecto de mouse-over simulado con CSS en SVG */
    svg:hover .point {
      fill-opacity: 0.8;
      stroke: rgba(255, 255, 255, 0.5);
      stroke-width: 1px;
    }
  </style>
  
  <rect width="100%" height="100%" fill="#151515" />
  
  <circle class="point" cx="50" cy="50" r="3" />
  <circle class="point" cx="150" cy="120" r="4" />
  <circle class="point" cx="250" cy="30" r="2" />
  <circle class="point" cx="350" cy="160" r="5" />
  <circle class="point" cx="450" cy="80" r="3" />
  <circle class="point" cx="550" cy="140" r="4" />
  <circle class="point" cx="650" cy="40" r="2" />
  <circle class="point" cx="750" cy="180" r="5" />
  <circle class="point" cx="850" cy="70" r="3" />
  <circle class="point" cx="950" cy="110" r="4" />
  <circle class="point" cx="100" cy="170" r="3" />
  <circle class="point" cx="200" cy="60" r="4" />
  <circle class="point" cx="300" cy="130" r="2" />
  <circle class="point" cx="400" cy="20" r="5" />
  <circle class="point" cx="500" cy="190" r="3" />
  <circle class="point" cx="600" cy="90" r="4" />
  <circle class="point" cx="700" cy="150" r="2" />
  <circle class="point" cx="800" cy="50" r="5" />
  <circle class="point" cx="900" cy="160" r="3" />
  <circle class="point" cx="50" cy="190" r="4" />
</svg>
