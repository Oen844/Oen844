<svg xmlns="http://www.w3.org/2000/svg" width="600" height="150" viewBox="0 0 600 150">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@500&amp;display=swap');
    
    text {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 30px;
      fill: #0078D4;
      text-anchor: middle;
      opacity: 0;
      animation: typing 12s infinite;
    }
    
    /* Animación sincronizada para que las líneas aparezcan y desaparezcan */
    @keyframes typing {
      0%, 30%, 100% { opacity: 0; }
      3%, 27% { opacity: 1; }
    }
    
    .line-1 { animation-delay: 0s; }
    .line-2 { animation-delay: 3s; }
    .line-3 { animation-delay: 6s; }
    .line-4 { animation-delay: 9s; }
  </style>

  <rect width="600" height="150" fill="#1A1A1A" rx="10" />

  <text x="300" y="85" class="line-1">Ingeniero Full Stack</text>
  <text x="300" y="85" class="line-2">Arquitecto de IA</text>
  <text x="300" y="85" class="line-3">Especialista Gemini</text>
  <text x="300" y="85" class="line-4">RGPD Compliance</text>
</svg>
